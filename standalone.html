<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>중국어 단어장</title>
    <style>
      :root {
        color: #17201c;
        background: #f4f1ea;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app-shell {
        min-height: 100vh;
        padding: 32px;
        background:
          linear-gradient(135deg, rgba(194, 54, 40, 0.12), transparent 34%),
          linear-gradient(315deg, rgba(38, 114, 107, 0.14), transparent 38%),
          #f4f1ea;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(280px, 380px) minmax(0, 1fr);
        gap: 24px;
        width: min(1180px, 100%);
        margin: 0 auto;
      }

      .study-panel,
      .list-panel {
        border: 1px solid rgba(23, 32, 28, 0.1);
        border-radius: 8px;
        background: rgba(255, 252, 246, 0.92);
        box-shadow: 0 18px 54px rgba(74, 62, 42, 0.12);
      }

      .study-panel {
        align-self: start;
        padding: 24px;
      }

      .brand-row,
      .list-header,
      .count-badge,
      .search-box,
      .primary-button {
        display: flex;
        align-items: center;
      }

      .brand-row {
        gap: 14px;
        margin-bottom: 28px;
      }

      .brand-mark {
        display: grid;
        width: 48px;
        height: 48px;
        place-items: center;
        border-radius: 8px;
        color: #fffaf1;
        background: #b8392f;
        font-size: 1.4rem;
        font-weight: 900;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: #6a6f63;
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      h2 {
        margin: 0;
        color: #17201c;
        line-height: 1.1;
      }

      h1 {
        font-size: clamp(1.7rem, 3vw, 2.4rem);
      }

      h2 {
        font-size: clamp(1.35rem, 2vw, 1.85rem);
      }

      .entry-form {
        display: grid;
        gap: 16px;
      }

      .entry-form label {
        display: grid;
        gap: 8px;
        color: #37423c;
        font-size: 0.92rem;
        font-weight: 700;
      }

      .entry-form input,
      .search-box input {
        width: 100%;
        min-height: 46px;
        border: 1px solid rgba(23, 32, 28, 0.16);
        border-radius: 8px;
        color: #17201c;
        background: #fffdf8;
        outline: none;
      }

      .entry-form input {
        padding: 0 14px;
      }

      .entry-form input:focus,
      .search-box input:focus {
        border-color: #26726b;
        box-shadow: 0 0 0 4px rgba(38, 114, 107, 0.14);
      }

      .primary-button {
        justify-content: center;
        gap: 8px;
        min-height: 48px;
        margin-top: 4px;
        border: 0;
        border-radius: 8px;
        color: #fffaf1;
        background: #26726b;
        font-weight: 800;
      }

      .primary-button:hover {
        background: #1f625c;
      }

      .list-panel {
        min-width: 0;
        padding: 24px;
      }

      .list-header {
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .count-badge {
        flex: 0 0 auto;
        gap: 7px;
        min-height: 36px;
        padding: 0 12px;
        border-radius: 999px;
        color: #9d2f27;
        background: #ffe7dc;
        font-weight: 800;
      }

      .search-box {
        gap: 10px;
        height: 48px;
        margin-bottom: 18px;
        padding: 0 14px;
        border: 1px solid rgba(23, 32, 28, 0.12);
        border-radius: 8px;
        color: #6a6f63;
        background: #fffdf8;
      }

      .search-box input {
        min-height: 44px;
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
      }

      .word-table {
        overflow: hidden;
        border: 1px solid rgba(23, 32, 28, 0.1);
        border-radius: 8px;
        background: #fffdf8;
      }

      .table-row {
        display: grid;
        grid-template-columns:
          minmax(90px, 1fr) minmax(100px, 1fr) minmax(120px, 1.4fr)
          44px;
        align-items: center;
        min-height: 58px;
        border-bottom: 1px solid rgba(23, 32, 28, 0.08);
      }

      .table-row:last-child {
        border-bottom: 0;
      }

      .table-row > * {
        min-width: 0;
        padding: 0 14px;
        overflow-wrap: anywhere;
      }

      .table-head {
        min-height: 42px;
        color: #6a6f63;
        background: #f7f2e8;
        font-size: 0.78rem;
        font-weight: 800;
      }

      .word {
        color: #b8392f;
        font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
        font-size: 1.35rem;
        font-weight: 800;
      }

      .icon-button {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        justify-self: center;
        padding: 0;
        border: 0;
        border-radius: 8px;
        color: #71685e;
        background: transparent;
      }

      .icon-button:hover {
        color: #b8392f;
        background: #ffe7dc;
      }

      .empty-state {
        display: none;
        min-height: 180px;
        place-items: center;
        align-content: center;
        gap: 10px;
        color: #6a6f63;
        text-align: center;
      }

      .empty-state p {
        margin: 0;
        font-weight: 700;
      }

      @media (max-width: 820px) {
        .app-shell {
          padding: 18px;
        }

        .workspace {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 560px) {
        .study-panel,
        .list-panel {
          padding: 18px;
        }

        .list-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .table-row {
          grid-template-columns: 1fr 40px;
          gap: 2px 0;
          min-height: auto;
          padding: 12px 0;
        }

        .table-row > * {
          padding: 4px 14px;
        }

        .table-head {
          display: none;
        }

        .word,
        .table-row span {
          grid-column: 1;
        }

        .icon-button {
          grid-column: 2;
          grid-row: 1 / span 3;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <aside class="study-panel" aria-label="중국어 단어 입력">
          <div class="brand-row">
            <div class="brand-mark" aria-hidden="true">文</div>
            <div>
              <p class="eyebrow">Chinese Study</p>
              <h1>중국어 단어장</h1>
            </div>
          </div>

          <form class="entry-form" id="entryForm">
            <label>
              <span>단어</span>
              <input id="wordInput" placeholder="예: 朋友" autocomplete="off" />
            </label>

            <label>
              <span>병음</span>
              <input id="pinyinInput" placeholder="예: péng you" autocomplete="off" />
            </label>

            <label>
              <span>뜻</span>
              <input id="meaningInput" placeholder="예: 친구" autocomplete="off" />
            </label>

            <button class="primary-button" type="submit">
              <span>+</span>
              <span>목록에 추가</span>
            </button>
          </form>
        </aside>

        <section class="list-panel" aria-label="내가 입력한 단어 목록">
          <div class="list-header">
            <div>
              <p class="eyebrow">Vocabulary List</p>
              <h2>내 단어 목록</h2>
            </div>
            <div class="count-badge">
              <span>책</span>
              <span id="entryCount">0개</span>
            </div>
          </div>

          <div class="search-box">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" placeholder="단어, 병음, 뜻 검색" aria-label="단어 검색" />
          </div>

          <div class="word-table" role="table" aria-label="단어 목록">
            <div class="table-row table-head" role="row">
              <span role="columnheader">단어</span>
              <span role="columnheader">병음</span>
              <span role="columnheader">뜻</span>
              <span role="columnheader" aria-label="삭제"></span>
            </div>
            <div id="wordList"></div>
            <div class="empty-state" id="emptyState">
              <div>책</div>
              <p>아직 표시할 단어가 없습니다.</p>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script>
      const storageKey = "chinese-vocabulary-entries";
      const starterEntries = [
        { id: 1, word: "你好", pinyin: "nǐ hǎo", meaning: "안녕하세요" },
        { id: 2, word: "学习", pinyin: "xué xí", meaning: "공부하다, 배우다" },
      ];

      function loadEntries() {
        const savedEntries = localStorage.getItem(storageKey);

        if (!savedEntries) return starterEntries;

        try {
          const parsedEntries = JSON.parse(savedEntries);
          return Array.isArray(parsedEntries) ? parsedEntries : starterEntries;
        } catch {
          return starterEntries;
        }
      }

      const entries = loadEntries();

      const form = document.querySelector("#entryForm");
      const wordInput = document.querySelector("#wordInput");
      const pinyinInput = document.querySelector("#pinyinInput");
      const meaningInput = document.querySelector("#meaningInput");
      const searchInput = document.querySelector("#searchInput");
      const wordList = document.querySelector("#wordList");
      const entryCount = document.querySelector("#entryCount");
      const emptyState = document.querySelector("#emptyState");

      function renderEntries() {
        const query = searchInput.value.trim().toLowerCase();
        const visibleEntries = entries.filter((entry) =>
          [entry.word, entry.pinyin, entry.meaning].some((field) =>
            field.toLowerCase().includes(query),
          ),
        );

        wordList.innerHTML = "";
        entryCount.textContent = `${entries.length}개`;
        localStorage.setItem(storageKey, JSON.stringify(entries));
        emptyState.style.display = visibleEntries.length ? "none" : "grid";

        visibleEntries.forEach((entry) => {
          const row = document.createElement("div");
          row.className = "table-row";
          row.setAttribute("role", "row");
          row.innerHTML = `
            <strong class="word" role="cell" lang="zh-Hans"></strong>
            <span role="cell"></span>
            <span role="cell"></span>
            <button class="icon-button" type="button" aria-label="삭제" title="삭제">×</button>
          `;

          row.querySelector(".word").textContent = entry.word;
          row.querySelectorAll("span")[0].textContent = entry.pinyin;
          row.querySelectorAll("span")[1].textContent = entry.meaning;
          row.querySelector("button").addEventListener("click", () => {
            const index = entries.findIndex((item) => item.id === entry.id);
            entries.splice(index, 1);
            renderEntries();
          });

          wordList.appendChild(row);
        });
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const word = wordInput.value.trim();
        const pinyin = pinyinInput.value.trim();
        const meaning = meaningInput.value.trim();

        if (!word || !pinyin || !meaning) return;

        entries.unshift({ id: Date.now(), word, pinyin, meaning });
        form.reset();
        wordInput.focus();
        renderEntries();
      });

      searchInput.addEventListener("input", renderEntries);
      renderEntries();
    </script>
  </body>
</html>
